worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript;

  # 上游: Supabase Kong 网关
  upstream supabase {
    server supabase-kong:8000;
    keepalive 32;
  }

  # 上游: Hono Worker
  upstream worker {
    server tariff-worker:3002;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;

    # 强制跳转 HTTPS（生产环境启用）
    # return 301 https://$host$request_uri;

    # 支付页静态文件
    location /pay/ {
      alias /usr/share/nginx/pay/;
      try_files $uri $uri/ /pay/index.html;
      add_header Cache-Control "public, max-age=3600";
    }

    # 支付成功页
    location /pay/success {
      alias /usr/share/nginx/pay/success.html;
      add_header Cache-Control "no-store";
    }

    # API 路由 → Supabase
    location /auth/ {
      proxy_pass http://supabase;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
    }

    location /rest/ {
      proxy_pass http://supabase;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
    }

    location /realtime/ {
      proxy_pass http://supabase;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Accept $http_upgrade;
    }

    location /storage/ {
      proxy_pass http://supabase;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
    }

    # Worker 路由
    location /api/ {
      # 支付回调直接代理到 Worker
      location ~ ^/api/(payments/notify|payments/wechat/notify|payments/alipay/notify|payments/stripe/webhook) {
        proxy_pass http://worker;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # Worker 端验签需要原始请求体
        proxy_set_header Content-Type $http_content_type;
      }

      # 其他管理 API
      proxy_pass http://worker;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
    }

    # 管理面板
    location /studio/ {
      proxy_pass http://supabase-studio:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
    }

    # 健康检查
    location /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }

  # HTTPS server（生产环境启用）
  # server {
  #   listen 443 ssl http2;
  #   server_name api.tarifftool.com pay.tarifftool.com;
  #
  #   ssl_certificate /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
  #   ssl_prefer_server_ciphers off;
  #
  #   # 同 HTTP 配置...
  # }
}
